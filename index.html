<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sytem Ascension</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#100c1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sytem Ascension">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root {
      --bg: #100c1f;
      --panel: rgba(22, 16, 40, 0.96);
      --line: #5d6aa8;
      --text: #f8f1ff;
      --muted: #b8b0d8;
      --accent: #5af0ff;
      --accent-2: #9dff85;
      --gold: #ffd867;
      --radius: 12px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Courier New", monospace;
      background: #0c0a1f;
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1520px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
    }

    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; padding: 12px; }
      .sidebar { position: static; order: -1; }
    }

    .sidebar, .content-panel, .modal-card {
      border: 2px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    /* Остальной CSS остаётся почти таким же, как раньше, но с улучшениями для мобильных */
    .tab-grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); }
    .card-grid, .shop-grid, .skill-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }

    .topbar-controls button, .btn {
      padding: 10px 14px;
      font-size: 14px;
    }

    /* Новые стили для мобильной версии */
    .mobile-top {
      display: none;
      background: rgba(16, 12, 31, 0.95);
      padding: 12px;
      border-bottom: 2px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    @media (max-width: 900px) {
      .mobile-top { display: flex; align-items: center; gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- Мобильная верхняя панель -->
  <div class="mobile-top">
    <button class="btn" onclick="toggleSidebar()">☰</button>
    <h2 style="margin:0; font-size:18px;" id="mobilePlayerName">Игрок</h2>
  </div>

  <div class="app-shell">
    <!-- Весь твой оригинальный HTML (sidebar + content-panel) остаётся здесь -->
    <!-- Я оставил его без изменений, только добавил новые кнопки и улучшения -->

    <!-- ... (весь твой старый body) ... -->

    <!-- Добавленные кнопки синхронизации в topbar -->
    <div class="topbar-controls" style="margin-left:auto; display:flex; gap:8px;">
      <button class="btn" onclick="exportSaveCode()">📤 Код сохранения</button>
      <button class="btn" onclick="showImportModal()">📥 Загрузить код</button>
      <button class="btn" id="renameBtn">Переименовать</button>
      <button class="btn warn" onclick="exportSave()">Экспорт файла</button>
      <button class="btn danger" onclick="confirmReset()">Сброс</button>
    </div>

    <!-- Модальное окно для импорта -->
    <div class="modal" id="importModal">
      <div class="modal-card">
        <h3>Загрузить прогресс</h3>
        <p class="muted">Вставь код сохранения из другого устройства:</p>
        <textarea id="importCode" rows="6" style="width:100%; font-family:monospace;"></textarea>
        <div style="margin-top:16px; text-align:right;">
          <button class="btn" onclick="closeImportModal()">Отмена</button>
          <button class="btn primary" onclick="importSaveCode()">Загрузить</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // === ВЕСЬ ТВОЙ СТАРЫЙ JAVASCRIPT КОД (из предыдущей версии) ===
    // (вставь сюда весь <script> из твоего рабочего файла)

    // === НОВЫЕ ФУНКЦИИ СИНХРОНИЗАЦИИ ===

    function exportSaveCode() {
      const data = JSON.stringify(state);
      const encoded = btoa(data);
      navigator.clipboard.writeText(encoded).then(() => {
        alert("✅ Код сохранения скопирован в буфер обмена!\nОтправь его себе в Telegram / заметки и вставь на другом устройстве.");
      });
    }

    function showImportModal() {
      document.getElementById("importModal").style.display = "flex";
    }

    function closeImportModal() {
      document.getElementById("importModal").style.display = "none";
    }

    function importSaveCode() {
      const encoded = document.getElementById("importCode").value.trim();
      if (!encoded) return alert("Вставь код!");
      try {
        const data = JSON.parse(atob(encoded));
        state = { ...state, ...data };
        saveState();
        closeImportModal();
        alert("✅ Прогресс успешно загружен!");
        render();
      } catch(e) {
        alert("❌ Неверный код сохранения");
      }
    }

    // Автоматическая регистрация PWA (уже была)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Переопределяем render(), чтобы обновлялось мобильное имя
    const originalRender = render;
    render = function() {
      originalRender();
      document.getElementById("mobilePlayerName").textContent = state.playerName;
    };
  </script>
</body>
</html>
